<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — Beans & Cones</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif;
      background: #f5f0eb;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      padding: 40px 36px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
    }
    .logo { text-align: center; margin-bottom: 28px; }
    .logo h1 { color: #4a2c2a; font-size: 24px; }
    .logo p  { color: #888; font-size: 14px; margin-top: 4px; }
    label {
      display: block; font-size: 14px;
      font-weight: 600; color: #333; margin-bottom: 6px;
    }
    input {
      width: 100%; padding: 12px 14px;
      border: 1px solid #ddd; border-radius: 8px;
      font-size: 15px; outline: none;
      transition: border 0.2s; margin-bottom: 16px;
    }
    input:focus { border-color: #4a2c2a; }
    button {
      width: 100%; padding: 13px;
      background: #4a2c2a; color: #fff;
      border: none; border-radius: 8px;
      font-size: 16px; font-weight: bold;
      cursor: pointer; transition: background 0.2s;
    }
    button:hover   { background: #3a1c1a; }
    button:disabled { background: #aaa; cursor: not-allowed; }
    .msg {
      margin-top: 14px; padding: 12px 14px;
      border-radius: 8px; font-size: 14px;
      text-align: center; display: none;
    }
    .msg.ok  { background:#e6f4ea; color:#2e7d32; border:1px solid #a5d6a7; }
    .msg.err { background:#fdecea; color:#c62828; border:1px solid #ef9a9a; }
    .hint { font-size:12px; color:#aaa; margin-top:-10px; margin-bottom:14px; }
    .center { text-align:center; padding: 10px 0 20px; }
    .big-icon { font-size: 52px; }
    .back { text-align:center; margin-top:16px; font-size:14px; }
    .back a { color:#4a2c2a; font-weight:bold; text-decoration:none; }
    .hidden { display: none; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <h1>☕ Beans & Cones</h1>
    <p id="subtitle">Reset your password</p>
  </div>

  <!-- Loading state -->
  <div id="loading" class="center">
    <p style="color:#888;">Verifying your reset link...</p>
  </div>

  <!-- Reset form (shown when token is valid) -->
  <div id="formSection" class="hidden">
    <label for="newPassword">New Password</label>
    <input type="password" id="newPassword" placeholder="Enter new password" />
    <p class="hint">Minimum 6 characters</p>

    <label for="confirmPassword">Confirm Password</label>
    <input type="password" id="confirmPassword" placeholder="Confirm new password" />

    <button id="submitBtn" onclick="doReset()">Reset Password</button>
    <div class="msg" id="formMsg"></div>
  </div>

  <!-- Success state -->
  <div id="successSection" class="hidden">
    <div class="center">
      <div class="big-icon">✅</div>
      <h3 style="color:#2e7d32; margin:12px 0 8px;">Password Reset!</h3>
      <p style="color:#666; font-size:14px;">Your password has been updated successfully. You can now login.</p>
    </div>
    <div class="back"><a href="http://localhost:5173/login">← Back to Login</a></div>
  </div>

  <!-- Error state (expired / invalid token) -->
  <div id="errorSection" class="hidden">
    <div class="center">
      <div class="big-icon">⏰</div>
      <h3 style="color:#c62828; margin:12px 0 8px;">Link Expired</h3>
      <p style="color:#666; font-size:14px;" id="errorText">This reset link has expired or is invalid.</p>
    </div>
    <div class="back" style="margin-top:20px;">
      <a href="/forgot-password">Request a new reset link</a>
    </div>
  </div>
</div>

<script>
  const params      = new URLSearchParams(window.location.search);
  const token       = params.get("token");
  const accountType = params.get("type") || "staff";

  function show(id) {
    ["loading","formSection","successSection","errorSection"].forEach(s => {
      document.getElementById(s).classList.toggle("hidden", s !== id);
    });
  }

  function showFormMsg(text, isOk) {
    const el = document.getElementById("formMsg");
    el.textContent   = text;
    el.className     = "msg " + (isOk ? "ok" : "err");
    el.style.display = "block";
  }

  // ─── On load: validate token ──────────────────────────────────────────────
  window.addEventListener("load", async () => {
    if (!token) {
      document.getElementById("errorText").textContent = "No reset token found in the link.";
      show("errorSection");
      return;
    }

    const validateUrl = accountType === "customer"
      ? "/api/customers/validate-token"
      : "/api/auth/validate-token";

    try {
      const res  = await fetch(validateUrl, {
        method:  "POST",
        headers: { "Content-Type": "application/json" },
        body:    JSON.stringify({ token }),
      });
      const data = await res.json();

      if (data.success) {
        show("formSection");
      } else {
        document.getElementById("errorText").textContent = data.message;
        show("errorSection");
      }
    } catch {
      document.getElementById("errorText").textContent = "Could not verify the link. Please try again.";
      show("errorSection");
    }
  });

  // ─── Reset password ───────────────────────────────────────────────────────
  async function doReset() {
    const newPassword     = document.getElementById("newPassword").value;
    const confirmPassword = document.getElementById("confirmPassword").value;

    if (newPassword.length < 6) return showFormMsg("Password must be at least 6 characters.", false);
    if (newPassword !== confirmPassword) return showFormMsg("Passwords do not match.", false);

    const btn = document.getElementById("submitBtn");
    btn.disabled    = true;
    btn.textContent = "Resetting...";

    const resetUrl = accountType === "customer"
      ? "/api/customers/reset-password"
      : "/api/auth/reset-password";

    try {
      const res  = await fetch(resetUrl, {
        method:  "PATCH",
        headers: { "Content-Type": "application/json" },
        body:    JSON.stringify({ token, newPassword }),
      });
      const data = await res.json();

      if (data.success) {
        show("successSection");
        document.getElementById("subtitle").textContent = "All done!";
      } else {
        showFormMsg(data.message, false);
        btn.disabled    = false;
        btn.textContent = "Reset Password";
      }
    } catch {
      showFormMsg("Network error. Please try again.", false);
      btn.disabled    = false;
      btn.textContent = "Reset Password";
    }
  }
</script>
</body>
</html>
