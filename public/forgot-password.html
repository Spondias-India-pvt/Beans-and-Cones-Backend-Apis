<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password — Beans & Cones</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif;
      background: #f5f0eb;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      padding: 40px 36px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
    }
    .logo { text-align: center; margin-bottom: 28px; }
    .logo h1 { color: #4a2c2a; font-size: 24px; }
    .logo p  { color: #888; font-size: 14px; margin-top: 4px; }
    label {
      display: block; font-size: 14px;
      font-weight: 600; color: #333; margin-bottom: 6px;
    }
    input {
      width: 100%; padding: 12px 14px;
      border: 1px solid #ddd; border-radius: 8px;
      font-size: 15px; outline: none;
      transition: border 0.2s; margin-bottom: 16px;
    }
    input:focus { border-color: #4a2c2a; }
    .captcha-wrap { margin-bottom: 16px; min-height: 78px; }
    button {
      width: 100%; padding: 13px;
      background: #4a2c2a; color: #fff;
      border: none; border-radius: 8px;
      font-size: 16px; font-weight: bold;
      cursor: pointer; transition: background 0.2s;
    }
    button:hover    { background: #3a1c1a; }
    button:disabled { background: #aaa; cursor: not-allowed; }
    .msg {
      margin-top: 14px; padding: 12px 14px;
      border-radius: 8px; font-size: 14px;
      text-align: center; display: none;
    }
    .msg.ok  { background:#e6f4ea; color:#2e7d32; border:1px solid #a5d6a7; }
    .msg.err { background:#fdecea; color:#c62828; border:1px solid #ef9a9a; }
    .step { display: none; }
    .step.active { display: block; }
    .center { text-align:center; padding: 10px 0 20px; }
    .big-icon { font-size: 52px; }
    .badge {
      display: inline-block;
      background: #f5f0eb; color: #4a2c2a;
      font-size: 12px; font-weight: 600;
      padding: 4px 10px; border-radius: 20px;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <h1>☕ Beans & Cones</h1>
    <p id="subtitle">Forgot your password?</p>
  </div>

  <!-- Step 1: Enter email + CAPTCHA -->
  <div class="step active" id="step1">
    <div style="text-align:center; margin-bottom:16px;">
      <span class="badge">🔐 Staff & Admin Portal</span>
    </div>

    <label>Email Address</label>
    <input type="email" id="staffEmail" placeholder="Enter your registered email" />

    <!-- reCAPTCHA rendered here dynamically -->
    <div class="captcha-wrap" id="captchaContainer"></div>

    <button onclick="sendResetLink()">Send Reset Link</button>
    <div class="msg" id="msg1"></div>
  </div>

  <!-- Step 2: Email sent confirmation -->
  <div class="step" id="step2">
    <div class="center">
      <div class="big-icon">📧</div>
      <h3 style="color:#4a2c2a; margin:12px 0 8px;">Check your email</h3>
      <p style="color:#666; font-size:14px; line-height:1.6;">
        We sent a password reset link to<br>
        <strong id="sentTo"></strong><br><br>
        Click the link in the email to reset your password.<br>
        <span style="color:#aaa; font-size:12px;">Link expires in 30 minutes.</span>
      </p>
    </div>
    <button onclick="goBack()" style="background:#888; margin-top:8px;">Send again</button>
  </div>
</div>

<script>
  let widgetId = null;

  // ─── Load site key from backend, then load reCAPTCHA ─────────────────────
  window.onRecaptchaLoad = function () {
    fetch("/api/config")
      .then(r => r.json())
      .then(config => {
        if (config.recaptchaSiteKey) {
          widgetId = grecaptcha.render("captchaContainer", {
            sitekey: config.recaptchaSiteKey,
          });
        } else {
          document.getElementById("captchaContainer").innerHTML =
            '<p style="color:#aaa;font-size:12px;">CAPTCHA not configured</p>';
        }
      })
      .catch(() => {
        document.getElementById("captchaContainer").innerHTML =
          '<p style="color:#aaa;font-size:12px;">CAPTCHA unavailable</p>';
      });
  };

  function showMsg(text, isOk) {
    const el = document.getElementById("msg1");
    el.textContent   = text;
    el.className     = "msg " + (isOk ? "ok" : "err");
    el.style.display = "block";
  }

  async function sendResetLink() {
    const email        = document.getElementById("staffEmail").value.trim();
    const captchaToken = widgetId !== null ? grecaptcha.getResponse(widgetId) : "";

    if (!email)        return showMsg("Please enter your email address.", false);
    if (!captchaToken) return showMsg("Please complete the CAPTCHA verification.", false);

    try {
      const res  = await fetch("/api/auth/forgot-password", {
        method:  "POST",
        headers: { "Content-Type": "application/json" },
        body:    JSON.stringify({ email, captchaToken }),
      });
      const data = await res.json();

      if (data.success) {
        document.getElementById("sentTo").textContent = email;
        document.getElementById("step1").classList.remove("active");
        document.getElementById("step2").classList.add("active");
        document.getElementById("subtitle").textContent = "Email sent!";
      } else {
        showMsg(data.message, false);
        if (widgetId !== null) grecaptcha.reset(widgetId);
      }
    } catch {
      showMsg("Network error. Please try again.", false);
      if (widgetId !== null) grecaptcha.reset(widgetId);
    }
  }

  function goBack() {
    document.getElementById("step2").classList.remove("active");
    document.getElementById("step1").classList.add("active");
    document.getElementById("subtitle").textContent = "Forgot your password?";
    if (widgetId !== null) grecaptcha.reset(widgetId);
  }
</script>

<!-- Load reCAPTCHA with callback — renders after site key is fetched -->
<script src="https://www.google.com/recaptcha/api.js?onload=onRecaptchaLoad&render=explicit" async defer></script>

</body>
</html>
